ted\", \"Project charter approved\" ], \"estimated_effort_hours\": 4, \"key_concept\": \"Retail KPI framing\" }, { \"name\": \"Order and inventory conformance\", \"expectations\": \"Core retail facts and dimensions are standardized with automated quality rules.\", \"completion_criteria\": [ \"Silver tests are green\", \"Inventory and returns logic documented\", \"Late-arriving records handled\" ], \"estimated_effort_hours\": 6, \"key_concept\": \"Conformed retail modeling\" }, { \"name\": \"Executive dashboard and portfolio handoff\", \"expectations\": \"Gold KPI marts support real business questions and are packaged into an interview-ready portfolio narrative.\", \"completion_criteria\": [ \"Dashboard walkthrough recorded\", \"Metric dictionary reconciles to source\", \"Portfolio artifacts published\" ], \"estimated_effort_hours\": 5, \"key_concept\": \"Decision-grade storytelling\" } ] }, \"deliverables_acceptance_criteria\": { \"deliverables\": [ \"Architecture diagram\", \"Retail bronze/silver/gold pipeline\", \"Executive dashboard\", \"Narrated project walkthrough\" ], \"acceptance_criteria\": [ \"Order and inventory grain are documented\", \"Gross margin KPI reconciles to source data\", \"Business outcomes are quantified in the walkthrough\" ] }, \"risks_assumptions\": { \"risks\": [ \"Retail extracts may not include stable SKU keys\", \"Return logic can distort margin if modeled inconsistently\", \"Stakeholder KPI definitions may shift mid-project\" ], \"assumptions\": [ \"Selected public data sources remain accessible\", \"Candidate can sustain a weekly delivery cadence and review feedback quickly\" ] }, \"stretch_goals\": { \"items\": [ \"Add promotional markdown analysis\", \"Publish semantic layer tests for margin KPIs\", \"Create a short case-study PDF for recruiters\" ] } } }, \"interview_ready_package\": { \"star_bullets\": [ \"Situation: Merchandising and finance teams were spending too much time reconciling cross-channel sales, inventory, and returns