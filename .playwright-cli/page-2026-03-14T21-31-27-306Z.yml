esh on different cadences and break KPI consistency during Monday business reviews.\", \"current_state\": \"Merchandising and finance teams reconcile sales, inventory, and returns in spreadsheets, delaying root-cause analysis for stockouts, markdown pressure, and margin erosion.\", \"future_state\": \"A retail intelligence lakehouse publishes decision-grade gold KPIs by store, channel, and product family with explicit lineage from bronze ingestion through silver conformance and executive-ready dashboard views.\", \"target_metrics\": [ { \"metric\": \"margin_report_latency_hours\", \"target\": \"<4\" }, { \"metric\": \"inventory_turn_visibility\", \"target\": \"daily by store and channel\" }, { \"metric\": \"manual_reconciliation_reduction\", \"target\": \">=30%\" } ], \"domain_focus\": [ \"retail\", \"ecommerce\" ], \"data_sources\": [ { \"name\": \"Sample Superstore Sales Dataset\", \"url\": \"https://www.kaggle.com/datasets/vivek468/superstore-dataset-final\", \"ingestion_doc_url\": \"https://www.kaggle.com/docs/api\", \"selection_rationale\": \"Provides order-level retail facts that are well suited for bronze-to-gold modeling, KPI design, and executive dashboard storytelling.\", \"ingestion_instructions\": \"Use documented API/file endpoint, land raw extract to bronze with run metadata, then apply conformance tests in silver before publishing gold KPIs.\" }, { \"name\": \"Bureau of Labor Statistics Public Data API\", \"url\": \"https://www.bls.gov/data/\", \"ingestion_doc_url\": \"https://www.bls.gov/developers/home.htm\", \"selection_rationale\": \"Provides real API ingestion practice plus documented schemas for incremental loads and trend dashboards.\", \"ingestion_instructions\": \"Use documented API/file endpoint, land raw extract to bronze with run metadata, then apply conformance tests in silver before publishing gold KPIs.\" }, { \"name\": \"NYC TLC Trip Record Data\", \"url\": \"https://www.nyc.gov/site/tlc/about/tlc-trip-record-data.page\", \"ingestion_doc_url\": \"https://www.nyc.gov/assets/tlc/downloads/pdf/data_dictionary_trip_records_yellow.pdf\", \"selection_rationale\": \"Public trip-level facts are excellent for building medallion pipelines and KPI reporting exercises.\", \"ingestion_instructions\": \"Use documented API/file endpoint, land raw extract to bronze with run metadata, then apply conformance tests in silver before publishing gold KPIs.\" } ] }, \"solution_architecture\": { \"ingestion\": { \"source_pattern\": \"Daily retail flat-file loads plus documented public extracts for orders, products, and inventory snapshots.\", \"cadence\": \"Daily for core sales and inventory facts, weekly for macro context enrichments.\" }, \"processing\": { \"engine\": \"PySpark plus SQL/dbt transformations\", \"orchestration\": \"Scheduled workflows with freshness alerts, duplicate detection, and late-arriving dimension handling.\" }, \"storage\": { \"bronze\": \"Raw order, product, and inventory payloads with batch metadata and source load timestamps.\", \"silver\": \"Conformed retail entities for orders, stores, products, returns, and calendar dimensions.\", \"gold\": \"Executive marts for margin, inventory turns, sell-through, stockout risk, and return rate trends.\" }, \"serving\": { \"tool\": \"Power BI\", \"connection\": \"gold marts and published Power BI semantic models with governed metric definitions\" }, \"medallion_plan\": { \"bronze\": \"Ingest retail sales and inventory files with reproducible batch IDs, source filenames, and row-count checks so every run can be replayed and audited.\", \"silver\": \"Conform store, product, and transaction grains; standardize returns logic; and enforce freshness, uniqueness, and accepted-values checks before KPI aggregation.\", \"gold\": \"Publish executive-ready marts for gross margin, return rate, inventory turns, and channel performance with documented calculation logic and retailer-facing business labels.\" }, \"primary_tools\": [ \"databricks\", \"dbt\", \"power bi\", \"python\", \"sql\" ], \"target_skills\": [] }, \"project_story\": { \"executive_summary\": \"GlobalMart Retail Intelligence Pipeline gives merchandising leaders a trustworthy gross-margin KPI view by unifying POS, e-commerce, and inventory datasets into a bronze, silver, and gold retail stack that refreshes within 4 hours for Monday business reviews.\", \"challenge\": \"Leadership currently sees conflicting POS and e-commerce numbers, cannot explain why selected product categories lose 3% to 5% of margin after returns and markdowns, and loses hours each week validating stockout and markdown narratives before business reviews.\", \"approach\": \"Implement a bronze-to-gold retail pipeline, enforce conformed product and store dimensions, reconcile gross-margin KPI logic in SQL/dbt, and publish a Power BI executive dashboard backed by documented gold marts and a formal metric dictionary.\", \"impact_story\": \"The project targets a 30% reduction in spreadsheet reconciliation, daily visibility into inventory-turn KPI trends, and a measurable reduction in report latency from multi-day prep to a 4-hour dashboard SLA.\" }, \"milestones\": [ { \"name\": \"Current-state retail discovery\", \"duration_weeks\": 1, \"deliverables\": [ \"project charter\", \"source-to-KPI matrix\", \"stakeholder map\" ], \"milestone_tags\": [ \"discovery\", \"architecture\", \"roi\" ], \"resources\": [ { \"title\": \"Kimball Dimensional Modeling\", \"url\": \"https://www.kimballgroup.com/data-warehouse-business-intelligence-resources/\" } ], \"execution_plan\": \"Interview merchandising, e-commerce, and supply chain stakeholders; map order, inventory, and returns source fields to executive retail KPIs; then document refresh cadence, ownership, and report pain points in a charter packet that mirrors an internal consulting kickoff.\", \"expected_deliverable\": \"Signed charter with current-state pain points, future-state KPI plan, and a source inventory covering sales, inventory, and return workflows.\", \"business_why\": \"The project must ground technical design in a believable merchandising and margin problem, not generic reporting language.\", \"acceptance_checks\": [ \"Project charter signed and KPI matrix approved by sponsor\", \"KPI matrix published with source owner, refresh SLA, and sign-off date\" ] }, { \"name\": \"Retail bronze and silver foundation\", \"duration_weeks\": 2, \"deliverables\": [ \"bronze ingestion notebooks\", \"silver conformance tests\", \"entity model\" ], \"milestone_tags\": [ \"bronze\", \"silver\", \"pipeline\" ], \"resources\": [ { \"title\": \"Delta Lake Medallion Architecture\", \"url\": \"https://docs.databricks.com/en/lakehouse/medallion.html\" } ], \"execution_plan\": \"Land order, product, and inventory extracts into bronze with batch metadata, deduplicate transaction records, and standardize store, SKU, and date dimensions in silver using SQL/dbt quality tests before promoting any margin or stockout metrics.\", \"expected_deliverable\": \"Reproducible bronze-to-silver pipeline with documented schema checks, late-arriving record handling, and a conformed retail entity model.\", \"business_why\": \"Retail decisions break down when returns, promotions, or inventory snapshots are not modeled consistently across channels.\", \"acceptance_checks\": [ \"Silver tests pass for null keys, duplicates, and stale loads\", \"Order and inventory grain validated in architecture review notes\" ] }, { \"name\": \"Executive retail KPI mart\", \"duration_weeks\": 1, \"deliverables\": [ \"gold mart\", \"executive dashboard\", \"metric dictionary\" ], \"milestone_tags\": [ \"gold\", \"roi\", \"bi\" ], \"resources\": [ { \"title\": \"Power BI Design Guidance\", \"url\": \"https://learn.microsoft.com/en-us/power-bi/guidance/\" } ], \"execution_plan\": \"Build gold marts for sales, gross margin, inventory turns, and return rate by store and channel; publish the executive dashboard in Power BI; and reconcile KPI totals back to source extracts before recording the stakeholder walkthrough.\", \"expected_deliverable\": \"Power BI dashboard package with a metric dictionary, lineage notes, and business-ready views for margin, inventory, and returns analysis.\", \"business_why\": \"Executives need one trusted place to answer why margin is moving across stores, products, and channels.\", \"acceptance_checks\": [ \"Gross margin KPI validated against source sales totals\", \"Dashboard walkthrough recorded and published with sponsor feedback\" ] }, { \"name\": \"Portfolio packaging and hiring narrative\", \"duration_weeks\": 1, \"deliverables\": [ \"demo walkthrough\", \"architecture diagram\", \"resume bullets\" ], \"milestone_tags\": [ \"communication\", \"career\" ], \"resources\": [ { \"title\": \"GitHub Portfolio Guide\", \"url\": \"https://docs.github.com/en/get-started/showcase-your-work/about-your-profile\" } ], \"execution_plan\": \"Package the project like a client delivery: publish the architecture diagram in the GitHub repo, document retail modeling choices in the README, record a 10-minute narrated dashboard demo, and distill the work into interview-ready bullets tied to gross-margin and inventory-turn outcomes.\", \"expected_deliverable\": \"Release-tagged portfolio package with repo, runbook, architecture diagram, recorded demo link, and a concise interview story that references measured KPI outcomes.\", \"business_why\": \"A premium project should be easy to explain to recruiters, hiring managers, and technical interviewers.\", \"acceptance_checks\": [ \"Demo walkthrough recorded and published in the repository\", \"Resume bullets validated against repo artifacts and measured KPI outcomes\" ] } ], \"roi_dashboard_requirements\": { \"required_dimensions\": [ \"date\", \"store\", \"channel\", \"product_category\", \"region\" ], \"required_measures\": [ \"gross_sales\", \"gross_margin\", \"return_rate\", \"inventory_turns\", \"stockout_risk\" ], \"business_questions\": [ \"What are the top-selling products by region?\", \"How do seasonal trends affect sales performance?\", \"What is the average sales cycle duration across different product categories?\" ], \"visual_requirements\": [ \"Include an executive KPI band for gross sales, gross margin, and return rate.\", \"Show a trend comparing channel performance over time with store drill-down.\", \"Highlight the worst-performing categories or regions with clear annotation for business leaders.\" ], \"primary_kpi\": \"Gross Margin\" }, \"resource_plan\": { \"required\": [ { \"title\": \"Databricks Medallion Architecture\", \"url\": \"https://docs.databricks.com/en/lakehouse/medallion.html\" }, { \"title\": \"Power BI Design Guidance\", \"url\": \"https://learn.microsoft.com/en-us/power-bi/guidance/\" } ], \"recommended\": [ { \"title\": \"dbt Documentation\", \"url\": \"https://docs.getdbt.com/docs/introduction\" }, { \"title\": \"Kimball Group\", \"url\": \"https://www.kimballgroup.com/data-warehouse-business-intelligence-resources/\" } ], \"optional\": [ { \"title\": \"Storytelling with Data\", \"url\": \"https://www.storytellingwithdata.com/\" } ], \"affiliate_disclosure\": \"Some recommended resources may include affiliate links. Recommendations are selected for project relevance first.\", \"trust_language\": \"Resource recommendations are optional and do not change coaching feedback or project scoring.\" }, \"mentoring_cta\": { \"recommended_tier\": \"starter\", \"reason\": \"Mapped from resume/job signals: current=senior target=senior scope=foundational.\", \"trust_language\": \"Mentoring recommendations are guidance-only and should align with the candidate's goals and budget.\" }, \"project_charter\": { \"section_order\": [ \"prerequisites_resources\", \"executive_summary\", \"technical_architecture\", \"implementation_plan\", \"deliverables_acceptance_criteria\", \"risks_assumptions\", \"stretch_goals\" ], \"sections\": { \"prerequisites_resources\": { \"summary\": \"Before kickoff, confirm the retail da